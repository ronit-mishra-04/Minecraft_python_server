name: Build Linux Package

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq dpkg-dev
          python -m pip install --upgrade pip
          pip install requests

      - name: Build .deb package
        run: |
          PKG_NAME="minecraft-python-server"
          PKG_VERSION="1.0.0"
          DEB_DIR="build/deb/${PKG_NAME}_${PKG_VERSION}_all"

          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/local/lib/minecraft-server"
          mkdir -p "$DEB_DIR/usr/local/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"

          # Copy Python source
          cp server.py server_ui.py uninstall.py Azul_installer.py requirements.txt \
             "$DEB_DIR/usr/local/lib/minecraft-server/"

          # Create wrapper scripts
          for cmd in "minecraft-server:server.py" "minecraft-server-ui:server_ui.py" "minecraft-server-uninstall:uninstall.py"; do
            name="${cmd%%:*}"
            script="${cmd##*:}"
            cat > "$DEB_DIR/usr/local/bin/$name" << EOF
          #!/usr/bin/env bash
          exec python3 /usr/local/lib/minecraft-server/$script "\$@"
          EOF
            chmod 755 "$DEB_DIR/usr/local/bin/$name"
          done

          # Copy Debian files
          cp debian/control "$DEB_DIR/DEBIAN/control"
          cp debian/postinst "$DEB_DIR/DEBIAN/postinst"
          cp debian/prerm "$DEB_DIR/DEBIAN/prerm"
          chmod 755 "$DEB_DIR/DEBIAN/postinst" "$DEB_DIR/DEBIAN/prerm"

          # Desktop entry
          cp debian/minecraft-server-ui.desktop "$DEB_DIR/usr/share/applications/"

          # Installed size
          INSTALLED_SIZE=$(du -sk "$DEB_DIR" | cut -f1)
          sed -i "/^Architecture:/a Installed-Size: ${INSTALLED_SIZE}" "$DEB_DIR/DEBIAN/control"

          # Build
          mkdir -p dist/
          dpkg-deb --build "$DEB_DIR" "dist/${PKG_NAME}_${PKG_VERSION}_all.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-python-server-deb
          path: dist/*.deb

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: minecraft-python-server-deb
          path: linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
